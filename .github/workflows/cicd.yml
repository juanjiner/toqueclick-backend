name: Deploy to AWS Lambda

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Package for Lambda
        run: |
          mkdir -p lambda-package
          cp -r dist/ lambda-package/
          cp package.json lambda-package/
          cp package-lock.json lambda-package/
          cd lambda-package
          npm ci --omit=dev
          zip -r ../lambda-deployment.zip .

      # ── OIDC ──
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.PRD_AWS_ROLE }}
          aws-region: us-east-1

      # ── Backup env vars actuales ──
      - name: Backup current env vars
        run: |
          aws lambda get-function-configuration \
            --function-name ${{ secrets.PRD_LBF_NAME }} \
            --query 'Environment.Variables' \
            --output json > current_env.json

      # ── Inyectar vars de producción (ROBUSTO) ──
      - name: Set production env vars
        run: |
          jq -n \
            --arg DB_HOST "${{ secrets.PRD_DB_HOST }}" \
            --arg DB_PORT "${{ secrets.PRD_DB_PORT }}" \
            --arg DB_NAME "${{ secrets.PRD_DB_NAME }}" \
            --arg DB_SSL "${{ secrets.PRD_DB_SSL }}" \
            --arg AWS_BUCKET "${{ secrets.PRD_AWS_BUCKET }}" \
            --arg SECRET_MANAGER "${{ secrets.SECRET_MANAGER }}" \
            --arg COGNITO_USER_POOL_ID "${{ secrets.PRD_COGNITO_USER_POOL_ID }}" \
            --arg COGNITO_CLIENT_ID "${{ secrets.PRD_COGNITO_CLIENT_ID }}" \
            '{
              Variables: {
                DB_HOST: $DB_HOST,
                DB_PORT: $DB_PORT,
                DB_NAME: $DB_NAME,
                DB_SSL: $DB_SSL,
                AWS_BUCKET: $AWS_BUCKET,
                SECRET_MANAGER: $SECRET_MANAGER,
                COGNITO_USER_POOL_ID: $COGNITO_USER_POOL_ID,
                COGNITO_CLIENT_ID: $COGNITO_CLIENT_ID
              }
            }' > env.json

          aws lambda update-function-configuration \
            --function-name ${{ secrets.PRD_LBF_NAME }} \
            --environment file://env.json

      - name: Wait for config update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ secrets.PRD_LBF_NAME }}

      # ── Subir código ──
      - name: Upload new code
        run: |
          aws lambda update-function-code \
            --function-name ${{ secrets.PRD_LBF_NAME }} \
            --zip-file fileb://lambda-deployment.zip

      - name: Wait for code update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ secrets.PRD_LBF_NAME }}

      # ── Publicar versión ──
      - name: Publish new version
        id: publish
        run: |
          VERSION=$(aws lambda publish-version \
            --function-name ${{ secrets.PRD_LBF_NAME }} \
            --description "Deploy ${{ github.sha }}" \
            --query 'Version' \
            --output text)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Nueva versión: $VERSION"

      # ── Actualizar alias ──
      - name: Update alias
        run: |
          aws lambda update-alias \
            --function-name ${{ secrets.PRD_LBF_NAME }} \
            --name ${{ secrets.PRD_LBF_ALIAS }} \
            --function-version ${{ steps.publish.outputs.version }}

      # ── Restaurar env vars originales (robusto también) ──
      - name: Restore env vars on $LATEST
        run: |
          jq -n \
            --argjson vars "$(cat current_env.json)" \
            '{ Variables: $vars }' > restore-env.json

          aws lambda update-function-configuration \
            --function-name ${{ secrets.PRD_LBF_NAME }} \
            --environment file://restore-env.json
